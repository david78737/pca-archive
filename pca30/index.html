  }
];

let activeFilter = 'all';

function levelBadgeClass(level) {
  if (level === 'Advanced') return 'badge-level-advanced';
  if (level === 'Entrepreneurs') return 'badge-level-entrepreneurs';
  return 'badge-level-essentials';
}

const ytIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>`;

function renderCards() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const container = document.getElementById('cards');
  const noResults = document.getElementById('no-results');
  const countEl = document.getElementById('count');

  const filtered = sessions.filter(s => {
    const matchesFilter = activeFilter === 'all' ||
      s.level === activeFilter || s.format === activeFilter;
    const matchesSearch = !query ||
      s.title.toLowerCase().includes(query) ||
      s.presenter.toLowerCase().includes(query) ||
      s.synopsis.toLowerCase().includes(query) ||
      s.takeaways.some(t => t.toLowerCase().includes(query));
    return matchesFilter && matchesSearch;
  });

  countEl.textContent = `${filtered.length} of ${sessions.length} sessions`;

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  container.innerHTML = filtered.map((s, i) => `
    <div class="card" id="card-${i}">
      <div class="card-header" onclick="toggle(${i})">
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="card-presenter">${s.presenter}</div>
          <div class="card-badges">
            <span class="badge badge-format">${s.format}</span>
            <span class="badge ${levelBadgeClass(s.level)}">${s.level}</span>
          </div>
        </div>
        <svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 8l5 5 5-5"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="section-label">Synopsis</div>
        <div class="synopsis">${s.synopsis}</div>
        <div class="section-label">Key Takeaways</div>
        <ul class="takeaways">${s.takeaways.map(t => `<li>${t}</li>`).join('')}</ul>
        <div class="section-label">Who Should Read This</div>
        <div class="who">${s.who}</div>
        <div class="section-label">The Brief</div>
        <div class="brief">${s.brief}</div>
        ${s.youtube ? `<a class="yt-link" href="https://www.youtube.com/watch?v=${s.youtube}" target="_blank" rel="noopener">${ytIcon} Watch recording</a>` : ''}
      </div>
    </div>
  `).join('');
}

function toggle(i) {
  const card = document.getElementById(`card-${i}`);
  card.classList.toggle('open');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('search').addEventListener('input', renderCards);

renderCards();
</script>
</body>
</html>
