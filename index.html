const ytIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>`;

const levelClass = l => {
  const n = (l||'').toLowerCase();
  if (n === 'advanced') return 'badge-level-advanced';
  if (n === 'entrepreneurs') return 'badge-level-entrepreneurs';
  return 'badge-level-essentials';
};

const state = { event: 'all', level: 'all', q: '' };

function applyFilters() {
  const q = state.q.toLowerCase();
  return sessions.filter(s => {
    if (state.event !== 'all' && s.event !== state.event) return false;
    if (state.level !== 'all' && (s.level||'').toLowerCase() !== state.level.toLowerCase()) return false;
    if (q) {
      const hay = [s.title, s.presenter, s.synopsis, s.who, s.brief, ...(s.takeaways||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = applyFilters();
  const container = document.getElementById('sessions');
  document.getElementById('status').textContent = list.length + ' of ' + sessions.length + ' sessions';

  if (list.length === 0) {
    container.innerHTML = '<div class="empty">No sessions match your filters.</div>';
    return;
  }

  container.innerHTML = '';
  list.forEach((s, i) => {
    const ytLink = s.youtube
      ? `<a class="yt-link" href="https://www.youtube.com/watch?v=${s.youtube}" target="_blank" rel="noopener">${ytIcon} Watch recording</a>`
      : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293 5.293a1 1 0 01-1.414-1.414L11.586 10 6.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="card-presenter">${s.presenter}</div>
          <div class="badges">
            <span class="badge badge-event">${s.event}</span>
            <span class="badge ${levelClass(s.level)}">${s.level||''}</span>
            <span class="badge badge-format">${s.format||''}</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="section-label">Synopsis</div>
        <div class="synopsis">${s.synopsis||''}</div>
        <div class="section-label">Key Takeaways</div>
        <ul class="takeaways">${(s.takeaways||[]).map(t=>`<li>${t}</li>`).join('')}</ul>
        <div class="section-label">Best For</div>
        <div class="who">${s.who||''}</div>
        <div class="brief-row">${s.brief||''}</div>
        ${ytLink}
      </div>`;
    card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
    container.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    document.querySelectorAll(`.filter-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[group] = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  state.q = e.target.value;
  render();
});

render();
</script>
