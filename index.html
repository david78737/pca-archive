<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProductCamp Austin — Session Archive</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e8eaf0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; }
  a { color: #7b8ef0; }

  header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 22px 32px 18px; }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: #8890b8; margin-bottom: 4px; }
  header h1 { font-size: 22px; font-weight: 700; color: #e8eaf0; margin-bottom: 2px; }
  header .sub { font-size: 12px; color: #8898c0; }

  .controls { padding: 14px 32px 0; display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .group-label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: #9898b8; width: 56px; flex-shrink: 0; }

  .filter-btn {
    background: #1a1d27; border: 1px solid #2e3248; color: #c8cae8;
    border-radius: 5px; padding: 4px 11px; font-size: 12px; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .filter-btn:hover { background: #22253a; color: #e8eaff; }
  .filter-btn.active { background: #23274a; border-color: #5b6ad4; color: #e0e4ff; }

  .tag-btn {
    background: #141620; border: 1px solid #2e3248; color: #c0c0e0;
    border-radius: 4px; padding: 3px 9px; font-size: 11px; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .tag-btn:hover { background: #1e2035; color: #e0e0f8; }
  .tag-btn.active { background: #1a1d40; border-color: #5b6ad4; color: #d8e0ff; }
  .tag-count { opacity: .65; font-size: 10px; margin-left: 3px; }

  .search-row { display: flex; align-items: center; gap: 8px; padding: 10px 32px 0; }
  #search {
    flex: 1; background: #1a1d27; border: 1px solid #2a2d3a;
    color: #e8eaf0; border-radius: 5px; padding: 7px 12px; font-size: 13px; outline: none;
  }
  #search::placeholder { color: #7070a0; }
  #search:focus { border-color: #5b6ad4; }
  #clear-search { background: none; border: none; color: #7070a0; cursor: pointer; font-size: 18px; padding: 0 4px; display: none; }
  #clear-search.visible { display: block; }

  .divider { border: none; border-top: 1px solid #1e2030; margin: 8px 32px 0; }
  #status { padding: 8px 32px 2px; font-size: 12px; color: #8898c0; }

  .sessions { padding: 8px 32px 56px; display: flex; flex-direction: column; gap: 7px; }

  .card { background: #1a1d27; border: 1px solid #252838; border-radius: 8px; overflow: hidden; transition: border-color .15s; }
  .card.open { border-color: #5b6ad4; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; padding: 13px 14px; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .card-header:hover .card-title { color: #eef0ff; }
  .chevron { flex-shrink: 0; margin-top: 4px; width: 15px; height: 15px; color: #5060a0; transition: transform .18s; }
  .card.open .chevron { transform: rotate(90deg); }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: #d8ddf5; margin-bottom: 3px; transition: color .15s; }
  .card-presenter { font-size: 12px; color: #8898b8; margin-bottom: 6px; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
  .badge { font-size: 10px; font-weight: 600; border: 1px solid; border-radius: 3px; padding: 1px 6px; text-transform: uppercase; letter-spacing: .06em; }
  .badge-event         { border-color: #4a6090; color: #90b0e0; }
  .badge-essentials    { border-color: #3a7a3a; color: #90e090; }
  .badge-advanced      { border-color: #7a3a3a; color: #f09090; }
  .badge-entrepreneurs { border-color: #7a6a3a; color: #f0c070; }
  .badge-format        { border-color: #3a4a7a; color: #80a0e0; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .card-tag {
    font-size: 10px; border: 1px solid #252838; border-radius: 3px;
    padding: 1px 6px; color: #6878a8; background: #141620; cursor: pointer;
    transition: border-color .1s, color .1s;
  }
  .card-tag:hover, .card-tag.lit { border-color: #4a5ac0; color: #b0b8f0; background: #1a1d40; }

  .card-body { display: none; padding: 0 14px 14px 38px; }
  .card.open .card-body { display: block; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: #7b8ef0; margin: 13px 0 5px; }
  .synopsis  { color: #c8d0e8; line-height: 1.65; font-size: 13px; }
  .takeaways { list-style: none; }
  .takeaways li { color: #b8c0d8; padding: 3px 0 3px 16px; position: relative; font-size: 13px; }
  .takeaways li::before { content: "→"; position: absolute; left: 0; color: #7b8ef0; }
  .who       { color: #b8c0d8; font-style: italic; font-size: 13px; }
  .brief-row { margin-top: 10px; font-size: 12px; color: #8890a8; }
  .yt-link   { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 12px; color: #7b8ef0; text-decoration: none; }
  .yt-link:hover { color: #a0b0f8; }
  .yt-link svg { width: 13px; height: 13px; flex-shrink: 0; }

  .loading { text-align: center; padding: 4rem 2rem; color: #454860; font-size: 14px; }
  .empty   { text-align: center; padding: 4rem 2rem; color: #454860; font-size: 14px; }
  footer   { text-align: center; padding: 2rem; font-size: 11px; color: #333550; border-top: 1px solid #1a1d27; }

  @media (max-width: 600px) {
    header, .controls, .search-row, #status, .sessions { padding-left: 14px; padding-right: 14px; }
    .divider { margin-left: 14px; margin-right: 14px; }
    .group-label { width: 44px; }
    .card-body { padding-left: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">ProductCamp Austin · Community Archive</div>
  <h1>Session Archive</h1>
  <div class="sub">97 sessions &middot; PCA28–PCA34 &middot; 2023–2026</div>
</header>

<div class="controls">
  <div class="filter-row">
    <span class="group-label">Event</span>
    <button class="filter-btn active" data-group="event" data-filter="all">All</button>
    <button class="filter-btn" data-group="event" data-filter="PCA34">PCA34</button>
    <button class="filter-btn" data-group="event" data-filter="PCA33">PCA33</button>
    <button class="filter-btn" data-group="event" data-filter="PCA32">PCA32</button>
    <button class="filter-btn" data-group="event" data-filter="PCA31">PCA31</button>
    <button class="filter-btn" data-group="event" data-filter="PCA30">PCA30</button>
    <button class="filter-btn" data-group="event" data-filter="PCA29">PCA29</button>
    <button class="filter-btn" data-group="event" data-filter="PCA28">PCA28</button>
  </div>
  <div class="filter-row">
    <span class="group-label">Level</span>
    <button class="filter-btn active" data-group="level" data-filter="all">All</button>
    <button class="filter-btn" data-group="level" data-filter="Essentials">Essentials</button>
    <button class="filter-btn" data-group="level" data-filter="Advanced">Advanced</button>
    <button class="filter-btn" data-group="level" data-filter="Entrepreneurs">Entrepreneurs</button>
  </div>
  <div class="filter-row">
    <span class="group-label">Topic</span>
    <div id="tag-filters" style="display:flex;flex-wrap:wrap;gap:4px;">
      <!-- populated after DB loads -->
    </div>
  </div>
</div>

<div class="search-row">
  <input id="search" type="search" placeholder="Search titles, synopses, takeaways…" autocomplete="off">
  <button id="clear-search" title="Clear">✕</button>
</div>

<hr class="divider">
<div id="status"></div>
<div class="sessions" id="sessions"><div class="loading">Loading archive…</div></div>
<footer>ProductCamp Austin · Community-organized · All sessions volunteer-led</footer>

<!--
  sql.js — SQLite compiled to WebAssembly. Runs entirely in the browser,
  no server required. The .wasm file is fetched from the same CDN.
  Version pinned to 1.10.2; update build.js comment when bumping.
  https://sql.js.org / https://github.com/sql-js/sql.js
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
const SQLJS_WASM = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.wasm';
const DB_URL     = 'archive.db';

// TOP_TAGS is populated dynamically from the DB after load (ranked by session count).

const ytIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>';

const levelClass = l => {
  const n = (l||'').toLowerCase();
  if (n === 'advanced')      return 'badge-advanced';
  if (n === 'entrepreneurs') return 'badge-entrepreneurs';
  return 'badge-essentials';
};

// ── Filter state ──────────────────────────────────────────────────────────────
const state = { event: 'all', level: 'all', tag: null, q: '' };
let db = null;
let totalCount = 0;

// ── Query builder ─────────────────────────────────────────────────────────────
function runQuery() {
  if (!db) return [];

  const conditions = [];
  const params     = [];

  if (state.event !== 'all') {
    conditions.push('s.event = ?');
    params.push(state.event);
  }
  if (state.level !== 'all') {
    conditions.push('s.level = ?');
    params.push(state.level);
  }
  if (state.tag) {
    // tags is stored as a JSON array; use json_each to test membership
    conditions.push('EXISTS (SELECT 1 FROM json_each(s.tags) WHERE value = ?)');
    params.push(state.tag);
  }

  let sql;
  if (state.q.trim()) {
    // FTS5 full-text search with porter stemming and prefix matching.
    // Append * so "road" matches "roadmap", "strat" matches "strategy" etc.
    // Results ordered by BM25 relevance rank (lower = better in FTS5).
    const ftsQuery = state.q.trim().replace(/["']/g, '') + '*';
    const where = conditions.length ? 'AND ' + conditions.join(' AND ') : '';
    sql = `
      SELECT s.* FROM sessions s
      JOIN sessions_fts f ON f.rowid = s.id
      WHERE sessions_fts MATCH ? ${where}
      ORDER BY rank
    `;
    params.unshift(ftsQuery);
  } else {
    const where = conditions.length ? 'WHERE ' + conditions.join(' AND ') : '';
    sql = `SELECT * FROM sessions s ${where} ORDER BY s.event DESC, s.id ASC`;
  }

  try {
    const stmt = db.prepare(sql);
    stmt.bind(params);
    const rows = [];
    while (stmt.step()) rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  } catch (e) {
    console.warn('Query error:', e.message, '| SQL:', sql, '| params:', params);
    return [];
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const rows      = runQuery();
  const container = document.getElementById('sessions');
  document.getElementById('status').textContent =
    rows.length + ' of ' + totalCount + ' sessions';

  if (rows.length === 0) {
    container.innerHTML = '<div class="empty">No sessions match. Try adjusting filters.</div>';
    return;
  }

  container.innerHTML = '';
  rows.forEach(row => {
    const takeaways = JSON.parse(row.takeaways || '[]');
    const tags      = JSON.parse(row.tags      || '[]');

    const ytLink = row.youtube
      ? `<a class="yt-link" href="https://www.youtube.com/watch?v=${row.youtube}" target="_blank" rel="noopener">${ytIcon} Watch recording</a>`
      : '';

    const tagChips = tags.map(t =>
      `<span class="card-tag${state.tag === t ? ' lit' : ''}" data-tag="${t}">${t}</span>`
    ).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      `<div class="card-header">
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293 5.293a1 1 0 01-1.414-1.414L11.586 10 6.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        <div class="card-meta">
          <div class="card-title">${row.title}</div>
          <div class="card-presenter">${row.presenter}</div>
          <div class="badges">
            <span class="badge badge-event">${row.event}</span>
            <span class="badge ${levelClass(row.level)}">${row.level}</span>
            <span class="badge badge-format">${row.format}</span>
          </div>
          <div class="card-tags">${tagChips}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="section-label">Synopsis</div>
        <div class="synopsis">${row.synopsis}</div>
        <div class="section-label">Key Takeaways</div>
        <ul class="takeaways">${takeaways.map(t => `<li>${t}</li>`).join('')}</ul>
        <div class="section-label">Best For</div>
        <div class="who">${row.who}</div>
        <div class="brief-row">${row.brief}</div>
        ${ytLink}
      </div>`;

    card.querySelector('.card-header').addEventListener('click',
      () => card.classList.toggle('open'));

    card.querySelectorAll('.card-tag').forEach(chip => {
      chip.addEventListener('click', e => {
        e.stopPropagation();
        state.tag = state.tag === chip.dataset.tag ? null : chip.dataset.tag;
        syncTagButtons();
        render();
      });
    });

    container.appendChild(card);
  });
}

function syncTagButtons() {
  document.querySelectorAll('.tag-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tag === state.tag));
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.group;
    document.querySelectorAll(`.filter-btn[data-group="${g}"]`)
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[g] = btn.dataset.filter;
    render();
  });
});

const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clear-search');
searchEl.addEventListener('input', e => {
  state.q = e.target.value;
  clearBtn.classList.toggle('visible', state.q.length > 0);
  render();
});
clearBtn.addEventListener('click', () => {
  searchEl.value = ''; state.q = '';
  clearBtn.classList.remove('visible');
  render();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
// 1. Initialize sql.js WASM engine
// 2. Fetch archive.db (344 KB, cached by browser after first load)
// 3. Open in-memory database from the ArrayBuffer
// 4. Build the Topics filter strip
// 5. Render initial results
(async () => {
  try {
    const SQL  = await initSqlJs({ locateFile: () => SQLJS_WASM });
    const resp = await fetch(DB_URL);
    if (!resp.ok) throw new Error(`Failed to fetch ${DB_URL}: ${resp.status}`);
    const buf  = await resp.arrayBuffer();
    db = new SQL.Database(new Uint8Array(buf));

    totalCount = db.exec('SELECT COUNT(*) FROM sessions')[0].values[0][0];

    // Populate Topics strip — ranked by cross-session frequency with counts
    const strip = document.getElementById('tag-filters');
    const tagRows = db.exec(`
      SELECT j.value AS tag, COUNT(*) AS n
      FROM sessions, json_each(sessions.tags) j
      GROUP BY j.value
      ORDER BY n DESC
      LIMIT 26
    `);
    const tagData = tagRows.length ? tagRows[0].values : [];
    tagData.forEach(([t, n]) => {
      const btn = document.createElement('button');
      btn.className   = 'tag-btn';
      btn.dataset.tag = t;
      btn.innerHTML   = `${t}<span class="tag-count">${n}</span>`;
      btn.addEventListener('click', () => {
        state.tag = state.tag === t ? null : t;
        syncTagButtons();
        render();
      });
      strip.appendChild(btn);
    });

    render();
  } catch (err) {
    document.getElementById('sessions').innerHTML =
      `<div class="empty">Failed to load archive: ${err.message}</div>`;
    console.error(err);
  }
})();
</script>
</body>
</html>
