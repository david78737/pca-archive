const levelLabel = { essentials: "Essentials", advanced: "Advanced", entrepreneurs: "Entrepreneurs" };
const ytIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>`;

function render(list) {
  const container = document.getElementById('sessions');
  container.innerHTML = '';
  list.forEach((s) => {
    const ytLink = s.youtube
      ? `<a class="yt-link" href="https://www.youtube.com/watch?v=${s.youtube}" target="_blank" rel="noopener">${ytIcon} Watch recording</a>`
      : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <svg class="chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293 5.293a1 1 0 01-1.414-1.414L11.586 10 6.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        <div class="card-meta">
          <div class="card-title">${s.title}</div>
          <div class="card-presenter">${s.presenter}</div>
          <div class="badges">
            <span class="badge badge-level-${s.level}">${levelLabel[s.level]}</span>
            <span class="badge badge-format">${s.format}</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="section-label">Synopsis</div>
        <div class="synopsis">${s.synopsis}</div>
        <div class="section-label">Key Takeaways</div>
        <ul class="takeaways">${s.takeaways.map(t => `<li>${t}</li>`).join('')}</ul>
        <div class="section-label">Best For</div>
        <div class="who">${s.who}</div>
        <div class="brief-row">${s.brief}</div>
        ${ytLink}
      </div>`;
    card.querySelector('.card-header').addEventListener('click', () => card.classList.toggle('open'));
    container.appendChild(card);
  });
  document.getElementById('count').textContent = `${list.length} session${list.length !== 1 ? 's' : ''}`;
}

let activeFilter = 'all';
let searchQuery = '';

function applyFilters() {
  const q = searchQuery.toLowerCase();
  const filtered = sessions.filter(s => {
    const matchLevel = activeFilter === 'all' || s.level === activeFilter;
    const matchSearch = !q || [s.title, s.presenter, s.synopsis, ...(s.takeaways || []), s.who].join(' ').toLowerCase().includes(q);
    return matchLevel && matchSearch;
  });
  render(filtered);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

applyFilters();
</script>
